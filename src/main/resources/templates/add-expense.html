<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('body').addClass('loaded');
            $('a').on('click', function(e) {
                e.preventDefault();
                var link = $(this).attr('href');
                $('body').removeClass('loaded');
                setTimeout(function() {
                    window.location.href = link;
                }, 500);
            });
        });
    </script>
</head>
<body>
<div class="container">
    <h1 class="mt-5 form-heading">Add Expense</h1>

    <form th:action="@{/saveExpense}" 
          th:object="${expense}" 
          method="post" 
          class="mt-3">

        <div class="form-group">
            <label>Description:</label>
            <input type="text" 
                   th:field="*{description}" 
                   class="form-control" 
                   required>
        </div>

        <div class="form-group">
        <label for="category">Category:</label>
        <input type="text" id="category" name="category"
            th:field="*{category}" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="expenseDate">Date:</label>
            <input type="date" id="expenseDate" name="expenseDate"
                th:field="*{expenseDate}" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Amount:</label>
            <input type="number" 
                   step="0.01"
                   th:field="*{amount}" 
                   class="form-control" 
                   required>
        </div>


        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>
</body>
</html>
